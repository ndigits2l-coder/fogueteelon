<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lunar Lander</title>
<style>
    body{
        margin:0;
        overflow:hidden;
        background:black;
        color:#0f0;
        font-family:monospace;
    }
    canvas{display:block;}
    #hud{
        position:absolute;
        top:10px;
        left:10px;
        background:rgba(0,0,0,0.6);
        padding:10px;
        border:1px solid #0f0;
        border-radius:4px;
    }
    #message{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        font-size:48px;
        font-weight:bold;
        text-shadow:0 0 20px;
        pointer-events:none;
        opacity:0;
        transition:opacity 0.4s;
    }
</style>
</head>
<body>
<div id="hud"></div>
<div id="message"></div>
<canvas id="game"></canvas>

<script>
// ==================== CONFIGURAÇÕES ====================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");
const messageEl = document.getElementById("message");

let width, height;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ==================== VARIÁVEIS DO JOGO ====================
let fuel = 1200;
let x, y, vx = 0, vy = 0, angle = 0;
let landed = false;
let crashed = false;
let score = 0;

const pad = { width: 140, height: 8 };

function reset() {
    fuel = 1200;
    x = width / 2;
    y = 120;
    vx = (Math.random() - 0.5) * 2;
    vy = 0;
    angle = 0;
    landed = crashed = false;
    messageEl.style.opacity = 0;
}

// ==================== ÁUDIO (simples) ====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function thrustSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
    gain.gain.value = 0.15;
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    setTimeout(() => { osc.stop(); }, 60);
}

// ==================== UPDATE ====================
function update() {
    if (landed || crashed) {
        if (keys["r"] || keys["R"]) reset();
        return;
    }

    // Rotação
    if (keys["ArrowLeft"] || keys["a"] || keys["A"]) angle -= 0.055;
    if (keys["ArrowRight"] || keys["d"] || keys["D"]) angle += 0.055;

    // Gravidade
    vy += 0.038;

    // Propulsão
    if ((keys["ArrowUp"] || keys["w"] || keys["W"]) && fuel > 0) {
        fuel -= 2.8;
        vx += Math.sin(angle) * 0.11;
        vy -= Math.cos(angle) * 0.11;
        thrustSound();
    }

    x += vx;
    y += vy;

    // Limites laterais
    if (x < 20) { x = 20; vx = Math.abs(vx) * 0.6; }
    if (x > width - 20) { x = width - 20; vx = -Math.abs(vx) * 0.6; }

    // Colisão com o solo
    if (y >= height - 85) {
        const onPad = x > (width/2 - pad.width/2) && x < (width/2 + pad.width/2);
        const safeV = Math.abs(vy) < 1.8;
        const safeH = Math.abs(vx) < 1.2;
        const safeAngle = Math.abs(angle) < 0.25;

        if (onPad && safeV && safeH && safeAngle) {
            landed = true;
            score = Math.floor(fuel * 1.5 + (3 - Math.abs(vy)) * 100);
            showMessage("POUSO PERFEITO!", "#0f0");
        } else {
            crashed = true;
            showMessage("CRASH!", "#f00");
        }
    }
}

function showMessage(text, color) {
    messageEl.textContent = text;
    messageEl.style.color = color;
    messageEl.style.textShadow = `0 0 30px ${color}`;
    messageEl.style.opacity = 1;
}

// ==================== DESENHO ====================
function drawTerrain() {
    ctx.strokeStyle = "#0a0";
    ctx.lineWidth = 3;
    ctx.shadowColor = "#0f0";
    ctx.shadowBlur = 15;

    ctx.beginPath();
    ctx.moveTo(0, height - 60);
    
    for (let i = 0; i <= width; i += 35) {
        const isPadArea = i > width/2 - pad.width/2 - 30 && i < width/2 + pad.width/2 + 30;
        ctx.lineTo(i, isPadArea ? height - 68 : height - 60 + Math.sin(i * 0.02) * 18);
    }
    ctx.stroke();

    // Plataforma de pouso
    ctx.shadowBlur = 30;
    ctx.fillStyle = "#0f0";
    const padX = width/2 - pad.width/2;
    ctx.fillRect(padX, height - 72, pad.width, pad.height);
    ctx.shadowBlur = 0;
}

function drawShip() {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    const s = 0.85;

    // Corpo
    ctx.shadowColor = "rgba(255,255,255,0.2)";
    ctx.shadowBlur = 12;
    ctx.fillStyle = "#ddd";
    ctx.beginPath();
    ctx.roundRect(-13*s, -28*s, 26*s, 48*s, 6);
    ctx.fill();

    // Detalhes
    ctx.fillStyle = "#0ff";
    ctx.fillRect(-10*s, -24*s, 20*s, 4*s);
    ctx.fillRect(-9*s, 12*s, 18*s, 4*s);

    // Antena
    ctx.fillStyle = "#0ff";
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(0, -28*s);
    ctx.lineTo(0, -48*s);
    ctx.strokeStyle = "#0ff";
    ctx.lineWidth = 3;
    ctx.stroke();

    // Chama
    if ((keys["ArrowUp"] || keys["w"] || keys["W"]) && fuel > 0) {
        const fh = 22 + Math.random() * 28;
        const grad = ctx.createLinearGradient(0, 20, 0, 20 + fh);
        grad.addColorStop(0, "#fff");
        grad.addColorStop(0.3, "#ff0");
        grad.addColorStop(1, "transparent");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(-8*s, 20);
        ctx.lineTo(0, 20 + fh);
        ctx.lineTo(8*s, 20);
        ctx.fill();

        // Partículas
        for (let i = 0; i < 6; i++) {
            ctx.fillStyle = `hsla(35,100%,70%,${Math.random()})`;
            ctx.fillRect((Math.random()-0.5)*9*s, 20 + Math.random()*fh*0.7, 3, 3);
        }
    }

    ctx.restore();
}

function drawHUD() {
    hud.innerHTML = `
        Combustível: <span style="color:${fuel>300?'#0f0':fuel>100?'#ff0':'#f00'}">${Math.max(0, Math.floor(fuel))}</span><br>
        Vel. X: ${vx.toFixed(2)} | Vel. Y: ${vy.toFixed(2)}<br>
        Ângulo: ${(angle * 180 / Math.PI).toFixed(0)}°
    `;
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, width, height);

    drawTerrain();
    drawShip();
    drawHUD();

    if (landed || crashed) {
        ctx.fillStyle = landed ? "#0f0" : "#f00";
        ctx.font = "bold 52px monospace";
        ctx.textAlign = "center";
        ctx.shadowBlur = 40;
        ctx.shadowColor = ctx.fillStyle;
        ctx.fillText(landed ? "MISSÃO CUMPRIDA" : "FALHA NA MISSÃO", width/2, height/2 - 60);
        ctx.font = "24px monospace";
        ctx.fillText("Pressione R para jogar novamente", width/2, height/2 + 20);
        ctx.shadowBlur = 0;
    }
}

// ==================== LOOP ====================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
