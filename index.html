<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lunar Lander</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    color:#0f0;
    font-family:monospace;
}
canvas{
    display:block;
}
#hud{
    position:absolute;
    top:10px;
    left:10px;
}
</style>
</head>
<body>

<div id="hud"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const keys = {};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

let fuel, x, y, vx, vy, angle;
let landed = false;
let crashed = false;

const pad = {
    x: canvas.width/2 - 60,
    y: canvas.height - 80,
    width: 120
};

function reset(){
    fuel = 1000;
    x = canvas.width/2;
    y = 100;
    vx = 0;
    vy = 0;
    angle = 0;
    landed = false;
    crashed = false;
}

reset();

function update(){

    if(landed || crashed){
        if(keys["r"] || keys["R"]) reset();
        return;
    }

    if(keys["ArrowLeft"]) angle -= 0.05;
    if(keys["ArrowRight"]) angle += 0.05;

    vy += 0.04;

    if(keys["ArrowUp"] && fuel > 0){

        fuel -= 2;

        vx += Math.sin(angle) * 0.08;
        vy -= Math.cos(angle) * 0.08;
    }

    x += vx;
    y += vy;

    if(y >= pad.y - 15){

        const onPad =
            x > pad.x &&
            x < pad.x + pad.width;

        const safeVertical = Math.abs(vy) < 1.5;
        const safeHorizontal = Math.abs(vx) < 1;
        const safeAngle = Math.abs(angle) < 0.2;

        if(onPad && safeVertical && safeHorizontal && safeAngle){
            landed = true;
        }else{
            crashed = true;
        }
    }
}

function drawTerrain(){

    ctx.strokeStyle="#0f0";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(0,pad.y);

    for(let i=0;i<canvas.width;i+=40){

        if(i > pad.x-40 && i < pad.x+pad.width+40){
            ctx.lineTo(i,pad.y);
        }else{
            ctx.lineTo(
                i,
                pad.y + Math.sin(i*0.03)*20
            );
        }
    }

    ctx.stroke();

    ctx.strokeRect(
        pad.x,
        pad.y-2,
        pad.width,
        4
    );
}

function drawShip(){

    ctx.save();

    ctx.translate(x,y);
    ctx.rotate(angle);

    ctx.strokeStyle="#FFF";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(0,-15);
    ctx.lineTo(10,10);
    ctx.lineTo(-10,10);
    ctx.closePath();
    ctx.stroke();

    if(keys["ArrowUp"] && fuel > 0 && !landed){

        ctx.beginPath();
        ctx.moveTo(-4,10);
        ctx.lineTo(0,20 + Math.random()*10);
        ctx.lineTo(4,10);
        ctx.stroke();
    }

    ctx.restore();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawTerrain();
    drawShip();

    document.getElementById("hud").innerHTML = `
        COMBUSTÍVEL: ${Math.floor(fuel)}<br>
        VEL X: ${vx.toFixed(2)}<br>
        VEL Y: ${vy.toFixed(2)}<br>
        ÂNGULO: ${(angle*57.3).toFixed(1)}°
    `;

    if(landed){

        ctx.fillStyle="#0f0";
        ctx.font="40px monospace";
        ctx.fillText(
            "POUSO BEM-SUCEDIDO",
            canvas.width/2-220,
            canvas.height/2
        );
    }

    if(crashed){

        ctx.fillStyle="red";
        ctx.font="40px monospace";
        ctx.fillText(
            "CRASH!",
            canvas.width/2-80,
            canvas.height/2
        );
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
