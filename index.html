<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Lander - Ranking</title>

<style>
    /* --- Seu estilo atual, sem alterações --- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
        margin: auto;
        background: linear-gradient(#000814, #001d3d);
    }

    #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 18px;
        z-index: 10;
        pointer-events: none;
    }

    #fase-info {
        position: absolute;
        top: 10px;
        right: 10px;
        color: white;
        font-size: 18px;
        z-index: 10;
        pointer-events: none;
        text-align: right;
    }

    #sound-toggle {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
        font-family: Arial, sans-serif;
        transition: all 0.3s;
    }

    #sound-toggle:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    /* --- ESTILO DA TELA DE LOGIN (mais robusto) --- */
    #loginScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.92);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        font-family: Arial, sans-serif;
        padding: 20px;
        transition: opacity 0.5s ease;
    }
    /* Classe para esconder a tela de login */
    #loginScreen.hidden {
        opacity: 0;
        pointer-events: none;
    }

    #loginScreen h1 {
        color: #4fc3f7;
        font-size: 52px;
        margin-bottom: 6px;
        text-shadow: 0 0 30px rgba(79, 195, 247, 0.3);
    }

    #loginScreen .subtitle {
        color: #888;
        font-size: 18px;
        margin-bottom: 30px;
    }

    #loginScreen .input-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 320px;
    }

    #loginScreen input {
        padding: 14px 24px;
        font-size: 20px;
        border-radius: 10px;
        border: 2px solid #4fc3f7;
        background: #1a1a2e;
        color: white;
        text-align: center;
        width: 100%;
        outline: none;
        transition: 0.3s;
    }

    #loginScreen input:focus {
        border-color: #ffd700;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }

    #loginScreen input::placeholder {
        color: #555;
    }

    #startBtn {
        margin-top: 18px;
        padding: 14px 48px;
        font-size: 20px;
        border-radius: 10px;
        background: #4fc3f7;
        color: #000;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
        width: 100%;
        letter-spacing: 1px;
    }

    #startBtn:hover {
        background: #ffd700;
        transform: scale(1.02);
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    }

    #rankingPreview {
        margin-top: 30px;
        color: #aaa;
        font-size: 15px;
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 16px 24px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        min-width: 200px;
        line-height: 1.8;
    }

    #rankingPreview .title {
        color: #ffd700;
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 4px;
    }

    .credits {
        position: absolute;
        bottom: 20px;
        color: #333;
        font-size: 12px;
        letter-spacing: 2px;
    }

    /* --- O JOGO FICA VISÍVEL POR PADRÃO --- */
    #gameWrapper {
        display: block;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginScreen">
        <h1>🚀 ROCKET LANDER</h1>
        <p class="subtitle">🌙 Pouse o foguete. Bata recordes.</p>

        <div class="input-group">
            <input id="nameInput" type="text" maxlength="15" placeholder="Digite seu nome" autofocus>
            <button id="startBtn">🚀 JOGAR</button>
        </div>

        <div id="rankingPreview">
            <div class="title">🏆 TOP 3</div>
            <div id="rankingList">Nenhum recorde ainda. Seja o primeiro!</div>
        </div>

        <span class="credits">⬆️ ↑ acelera &nbsp;|&nbsp; ← → inclina</span>
    </div>

    <!-- JOGO (sempre visível, mas atrás da tela de login) -->
    <div id="gameWrapper">
        <div id="info"></div>
        <div id="fase-info"></div>
        <canvas id="game"></canvas>
        <button id="sound-toggle">🔊 Som: Ligado</button>
    </div>

    <script>
        // ====================================================
        // TODO O SEU CÓDIGO JAVASCRIPT COMPLETO AQUI
        // (incluindo a classe AudioManager, variáveis, funções, etc.)
        // ====================================================

        // ... (cole todo o seu código JavaScript existente aqui) ...

        // ====================================================
        // FUNÇÃO PARA INICIAR O JOGO (COM UM PEQUENO ATO DE MÁGICA)
        // ====================================================
        function iniciarJogo(nome) {
            // 1. Guarda o nome do jogador
            currentPlayer = nome.trim() || "Anônimo";

            // 2. ESCONDE A TELA DE LOGIN (a parte mais importante!)
            const loginScreen = document.getElementById('loginScreen');
            loginScreen.classList.add('hidden');

            // 3. Reinicia o estado do jogo
            resetGame();
            applyLevel(currentLevel);
            resetRocket();
            gameState = "playing";

            // 4. Para o som do motor, caso esteja tocando
            audio.stopEngine();
            engineWasOn = false;

            // 5. Atualiza a prévia do ranking
            atualizarRankingPreview();

            // 6. (OPCIONAL) Mostra uma mensagem de boas-vindas no console
            console.log(`🚀 Bem-vindo, ${currentPlayer}!`);
        }

        // ====================================================
        // CONFIGURA OS EVENTOS ASSIM QUE A PÁGINA CARREGAR
        // ====================================================
        document.addEventListener("DOMContentLoaded", function() {
            const startBtn = document.getElementById("startBtn");
            const nameInput = document.getElementById("nameInput");

            // Mostra o ranking ao carregar a página
            atualizarRankingPreview();

            // Evento para o botão JOGAR
            startBtn.addEventListener("click", function() {
                const nome = nameInput.value.trim() || "Anônimo";
                iniciarJogo(nome);
            });

            // Evento para a tecla "Enter" no campo de nome
            nameInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    startBtn.click();
                }
            });

            // Inicializa o áudio no primeiro clique do usuário
            document.addEventListener('click', function initAudio() {
                if (window.audio && typeof audio.init === 'function') {
                    audio.init();
                }
                document.removeEventListener('click', initAudio);
            }, { once: true });

            // Inicia o loop do jogo (ele já vai estar rodando, mesmo com a tela de login)
            // ... (seu loop `gameLoop` já deve estar chamando `requestAnimationFrame`)
        });

        // ====================================================
        // LOOP DO JOGO (já existente no seu código)
        // ====================================================
        // function gameLoop() { ... }
        // gameLoop();

        console.log('🚀 ROCKET LANDER - COM RANKING (versão turbinada)');
        console.log('👤 Digite seu nome e bata recordes!');
    </script>
</body>
</html>
